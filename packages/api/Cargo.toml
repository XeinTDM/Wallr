[package]
name = "api"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
# Server-only dependencies (optional, enabled by "server" feature)
ravif = { version = "0.11", default-features = false, features = ["threading"], optional = true }
image = { version = "0.24", optional = true }
fast_image_resize = { version = "6.0", optional = true }
rgb = { version = "0.8", optional = true }
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "json", "uuid", "chrono"], optional = true }
uuid = { version = "1.10", features = ["v4", "serde"], optional = true }
chrono = { version = "0.4", features = ["serde"] }
candle-core = { version = "0.10", optional = true }
candle-nn = { version = "0.10", optional = true }
candle-transformers = { version = "0.10", optional = true }
tokenizers = { version = "0.23", optional = true }
hf-hub = { version = "0.4", optional = true }
argon2 = { version = "0.5", optional = true }
blake3 = { version = "1.5", optional = true }
sha2 = { version = "0.10", optional = true }
base64 = "0.22.1"
redis = { version = "0.25.3", features = ["tokio-comp"], optional = true }
deadpool-redis = { version = "0.15.0", optional = true }
pasetors = { version = "0.7.8", optional = true }
cookie = { version = "0.18.1", optional = true }
http = { version = "1.4.0", optional = true }
rand = { version = "0.10.1", optional = true }
axum = { version = "0.8.9", optional = true, features = ["default"] }
axum-extra = { version = "0.12.6", features = ["cookie"], optional = true }
server_fn = { version = "0.8.12", optional = true }
dioxus-fullstack = { version = "0.7.9", optional = true }
tokio = { version = "1.52.2", features = ["rt-multi-thread", "process"], optional = true }
flate2 = { version = "1.0", optional = true }
tar = { version = "0.4", optional = true }
tokio-util = { version = "0.7", features = ["io"], optional = true }
reqwest = { version = "0.13.3", features = ["json"], optional = true }
urlencoding = { version = "2.1", optional = true }
rustrict = { version = "0.7.38", optional = true }
pgvector = { version = "0.3.2", features = ["sqlx"], optional = true }
oauth2 = { version = "4.4", optional = true }
img_hash = { version = "3.2", optional = true }
bk-tree = "0.5.0"
pdqhash = "0.1.1"
aws-config = { version = "1.1", optional = true }
aws-sdk-s3 = { version = "1.21", optional = true }
regex = { version = "1.12.3", optional = true }
strsim = { version = "0.11.1", optional = true }
unicode-segmentation = { version = "1.13.2", optional = true }
decancer = { version = "3.3.3", optional = true }
unicode-normalization = { version = "0.1.25", optional = true }
web-push-native = "0.4.0"
lettre = { version = "0.11.22", default-features = false, features = ["tokio1", "tokio1-rustls-tls", "builder", "hostname", "pool", "smtp-transport"] }

[features]
server = [
    "dioxus/server",
    "dep:ravif",
    "dep:image",
    "dep:fast_image_resize",
    "dep:rgb",
    "dep:sqlx",
    "dep:uuid",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:tokenizers",
    "dep:hf-hub",
    "dep:argon2",
    "dep:blake3",
    "dep:sha2",
    "dep:redis",
    "dep:deadpool-redis",
    "dep:pasetors",
    "dep:rand",
    "dep:server_fn",
    "dep:cookie",
    "dep:http",
    "dep:tokio",
    "dep:axum",
    "dep:axum-extra",
    "dep:flate2",
    "dep:tar",
    "dep:tokio-util",
    "dep:reqwest",
    "dep:urlencoding",
    "dep:rustrict",
    "dep:pgvector",
    "dep:oauth2",
    "dep:img_hash",
    "dep:aws-config",
    "dep:aws-sdk-s3",
    "dep:regex",
    "dep:strsim",
    "dep:unicode-segmentation",
    "dep:decancer",
    "dep:unicode-normalization"
]
http = ["dep:http"]
axum = ["dep:axum"]
axum-extra = ["dep:axum-extra"]
server_fn = ["dep:server_fn"]
dioxus-fullstack = ["dep:dioxus-fullstack"]
tokio = ["dep:tokio"]
reqwest = ["dep:reqwest"]
rustrict = ["dep:rustrict"]
oauth2 = ["dep:oauth2"]
regex = ["dep:regex"]
strsim = ["dep:strsim"]
unicode-segmentation = ["dep:unicode-segmentation"]
decancer = ["dep:decancer"]
unicode-normalization = ["dep:unicode-normalization"]
