[package]
name = "desktop"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true, features = ["router", "fullstack"] }
ui = { workspace = true }
api = { workspace = true }
image = "0.25.10"
tokio = { version = "1.52.3", features = ["rt-multi-thread"] }
tower-http = { version = "0.6.10", features = ["fs"] }
muda = "0.19.1"
tray-icon = "0.24.0"
global-hotkey = "0.8.0"
rand = "0.8.5"
wallpaper = "3.2.0"

[features]
default = ["desktop"]
desktop = ["dioxus/desktop", "ui/desktop"]
server = ["dioxus/server", "ui/server"]

[target."cfg(windows)".dependencies]
windows = { version = "0.62.2", features = ["Win32_Foundation", "Win32_UI_WindowsAndMessaging"] }
