[package]
name = "ui"
version = "0.1.0"
edition = "2024"

[dependencies]
dioxus = { workspace = true, features = ["router"] }
api = { workspace = true }
tokio = { version = "1.52.2", features = ["time"] }
lucide-dioxus = { version = "3.11.0", features = ["all-icons"] }
base64 = "0.22.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
wallpaper = { version = "3.2.0", optional = true }
image = "0.25.10"
open = { version = "5.3.4", optional = true }
rfd = { version = "0.17.2", optional = true }
auto-launch = { version = "0.6.0", optional = true }
dioxus-router = "0.7.9"
global-hotkey = "0.8.0"
serde = { version = "1.0.228", features = ["derive"] }
dioxus-signals = "0.7.9"
serde_json = "1.0.149"

[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.4.0", features = ["futures"] }
web-sys = { version = "0.3.97", features = ["Window", "Document", "Element", "DomRect", "KeyboardEvent", "HtmlElement", "File", "FileList", "Blob"] }
gloo-events = "0.3.0"
gloo-net = "0.7.0"
wasm-bindgen = "0.2"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reqwest = { version = "0.12", features = ["json", "multipart"] }

[features]
server = ["api/server"]
desktop = ["dep:wallpaper", "dep:rfd", "dep:open", "dep:auto-launch"]
wallpaper = ["dep:wallpaper"]
open = ["dep:open"]
auto-launch = ["dep:auto-launch"]
